<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥用植物測驗系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active glass-panel">
            <h1>藥用植物測驗系統</h1>
            <p>請選擇您要進行的測驗項目</p>
            <div class="menu-buttons">
                <button id="btn-flashcard-plant" class="primary-btn" style="background-color: #8b5cf6;">
                    <span class="icon">🌿</span>辨識植物單字卡 (全題庫)
                </button>
                <button id="btn-flashcard-family" class="primary-btn" style="background-color: #d946ef;">
                    <span class="icon">📇</span>科別拉丁名單字卡
                </button>
                <button id="btn-dictation" class="primary-btn">
                    <span class="icon">📝</span>科別拉丁名默寫 (隨機15題)
                </button>
                <div class="option-group">
                    <div class="select-wrapper">
                        <label for="plant-num-select">請選擇測驗題數：</label>
                        <select id="plant-num-select" class="glass-select">
                            <option value="10">10 題</option>
                            <option value="15">15 題</option>
                            <option value="20">20 題</option>
                            <option value="25">25 題</option>
                            <option value="30">30 題</option>
                            <option value="35">35 題</option>
                            <option value="40" selected>40 題</option>
                        </select>
                    </div>
                    <button id="btn-identification" class="primary-btn">
                        <span class="icon">🌿</span>植物辨認測試 (幻燈片模式)
                    </button>
                </div>
            </div>
        </div>

        <!-- Dictation Screen -->
        <div id="dictation-screen" class="screen glass-panel">
            <div class="screen-header">
                <h2>科別拉丁名默寫</h2>
                <button class="back-btn header-btn">返回主選單</button>
            </div>
            <p class="instruction">請根據中文科別填寫對應的拉丁名（共 15 題）</p>
            <div id="dictation-list" class="question-list">
                <!-- Dynamically populated -->
            </div>
            <div class="actions">
                <button id="submit-dictation" class="success-btn">送出試卷</button>
            </div>
        </div>

        <!-- Flashcard Screen -->
        <div id="flashcard-screen" class="screen glass-panel">
            <div class="screen-header">
                <h2 id="flashcard-title">植物單字卡</h2>
                <div class="info">
                    <span id="flashcard-progress" class="badge">第 1 / n 張</span>
                </div>
                <button class="back-btn header-btn">返回主選單</button>
            </div>
            
            <div class="flashcard-container" id="flashcard-container">
                <div class="flashcard-inner" id="flashcard-inner">
                    <div class="flashcard-front">
                        <img id="flashcard-image" src="" alt="植物圖片" />
                        <h2 id="flashcard-front-text" style="display: none; font-size: 3rem; color: #f8fafc; margin: auto;"></h2>
                        <div id="flashcard-placeholder">圖片加載中...</div>
                        <div class="flashcard-instruction">點擊卡片翻面看答案 🔄</div>
                    </div>
                    <div class="flashcard-back">
                        <h3 id="flashcard-name" class="flashcard-name">植物名稱</h3>
                        <div class="review-hint-box" style="margin-top: 1rem;">
                            <h4>辨識重點</h4>
                            <p id="flashcard-hint" class="flashcard-hint-text"></p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flashcard-controls">
                <button id="flashcard-prev" class="primary-btn btn-sm">⬅️ 上一張</button>
                <button id="flashcard-shuffle" class="success-btn btn-sm">🔀 重新洗牌</button>
                <button id="flashcard-next" class="primary-btn btn-sm">下一張 ➡️</button>
            </div>
        </div>

        <!-- Identification Screen -->
        <div id="identification-screen" class="screen">
            <div class="identification-header glass-panel">
                <div class="info">
                    <span id="current-question-num" class="badge">第 1 / 40 題</span>
                </div>
                <div class="timer-container">
                    <div class="timer-bar" id="timer-bar"></div>
                    <span id="timer-text">30s</span>
                </div>
                <button class="back-btn header-btn stop-btn">⏹ 結束測驗</button>
            </div>
            
            <div class="image-container glass-panel">
                <img id="plant-image" src="" alt="植物圖片" />
                <div id="image-placeholder">圖片加載中 / 未找到圖片</div>
            </div>

            <div class="options-container glass-panel" id="options-container">
                <!-- Buttons dynamically generated by app.js -->
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen glass-panel">
            <div class="screen-header">
                <h2>測驗結果</h2>
                <button class="back-btn header-btn">返回主選單</button>
            </div>
            <div class="score-card">
                <span class="score-label">總分</span>
                <span id="final-score" class="score-value">80</span>
            </div>
            <div id="results-list" class="results-list">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>
    
    <!-- Review Modal -->
    <div id="review-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button id="close-modal" class="close-btn">&times;</button>
            <h3 id="review-title">檢討</h3>
            <div class="review-image-container">
                <img id="review-image" src="" alt="植物圖片">
            </div>
            <div class="review-details">
                <p id="review-your-answer"></p>
                <p id="review-correct-answer"></p>
                <div class="review-hint-box" id="review-hint-box">
                    <h4>辨識重點</h4>
                    <p id="review-hint-text"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
